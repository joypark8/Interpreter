<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>회의 받아쓰기</title>
<style>
  :root{
    --ink:#1b1f23;
    --paper:#f6f3ec;
    --line:#1b1f23;
    --muted:#8a8478;
    --live:#3a7d44;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overscroll-behavior:none;
  }
  #app{
    display:flex; flex-direction:column;
    height:100vh; height:100dvh;
    max-width:720px; margin:0 auto;
    border-left:1px solid #00000012; border-right:1px solid #00000012;
  }

  header{
    padding:14px 18px 10px;
    border-bottom:2px solid var(--line);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  header h1{
    font-size:15px; letter-spacing:0.08em; text-transform:uppercase;
    font-weight:700; margin:0;
  }
  header .status{
    font-size:11px; letter-spacing:0.05em; color:var(--muted);
    display:flex; align-items:center; gap:6px;
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--muted); flex-shrink:0;
  }
  .dot.live{ background:var(--live); animation:pulse 1.4s infinite; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(58,125,68,0.5); }
    70%{ box-shadow:0 0 0 6px rgba(58,125,68,0); }
    100%{ box-shadow:0 0 0 0 rgba(58,125,68,0); }
  }

  /* ---------- Single accumulating text box ---------- */
  #feed{
    flex:1; overflow-y:auto;
    padding:18px;
  }
  #transcript{
    font-size:19px;
    line-height:1.7;
    white-space:pre-wrap;
    word-break:break-word;
  }
  #transcript .final-chunk{
    color:var(--ink);
  }
  #transcript .interim-chunk{
    color:var(--muted);
  }
  #feed-empty{
    color:var(--muted);
    font-size:13px; line-height:1.6;
    text-align:center;
    margin-top:40%;
    padding:0 30px;
  }

  /* ---------- Footer / controls ---------- */
  footer{
    border-top:2px solid var(--line);
    padding:14px 18px calc(14px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:10px;
  }
  .row{ display:flex; gap:10px; align-items:center; }
  #micBtn{
    flex:1;
    height:54px;
    border:2px solid var(--line);
    background:var(--ink);
    color:var(--paper);
    font-size:14px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
    border-radius:4px;
    cursor:pointer;
    transition:background 0.15s, color 0.15s;
  }
  #micBtn.active{
    background:var(--live);
    border-color:var(--live);
    color:#fff;
  }
  #micBtn:active{ transform:scale(0.985); }
  #clearBtn{
    height:54px; width:54px;
    border:2px solid var(--line);
    background:transparent;
    color:var(--ink);
    border-radius:4px;
    font-size:13px;
    cursor:pointer;
  }
  .hint{
    font-size:11px; color:var(--muted); text-align:center; letter-spacing:0.02em;
  }
  #errorBox{
    display:none;
    font-size:12px; color:#fff; background:#a23b2e;
    padding:8px 10px; border-radius:4px; line-height:1.5;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>회의 받아쓰기</h1>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">대기 중</span>
    </div>
  </header>

  <div id="feed">
    <div id="feed-empty">
      아래 버튼을 눌러 받아쓰기를 시작하세요.<br>
      말하는 대로 이 화면에 이어서 표시됩니다.
    </div>
    <div id="transcript" style="display:none;"></div>
  </div>

  <footer>
    <div id="errorBox"></div>
    <div class="row">
      <button id="micBtn">받아쓰기 시작</button>
      <button id="clearBtn" title="기록 지우기">⟲</button>
    </div>
    <div class="hint">말 중간에 잠시 멈춰도 끊기지 않습니다 · Chrome 권장</div>
  </footer>
</div>

<script>
(function(){
  const feedEmpty = document.getElementById('feed-empty');
  const transcriptEl = document.getElementById('transcript');
  const feed = document.getElementById('feed');
  const micBtn = document.getElementById('micBtn');
  const clearBtn = document.getElementById('clearBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const errorBox = document.getElementById('errorBox');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    errorBox.style.display = 'block';
    errorBox.textContent = '이 브라우저는 음성 인식을 지원하지 않습니다. 안드로이드 Chrome 브라우저에서 열어주세요.';
    micBtn.disabled = true;
    micBtn.style.opacity = 0.4;
  }

  let recognition = null;
  let running = false;            // user-intended state (toggle)
  let restarting = false;         // guard against double-start

  let finalizedText = '';         // everything confirmed so far, accumulated with spaces
  let lastFinalChunk = '';        // most recent finalized chunk, for dedup
  let lastFinalTime = 0;          // timestamp of most recent finalized chunk
  let pendingInterim = '';        // current not-yet-final chunk, shown in muted color

  let lastResultTime = Date.now(); // last time onresult actually fired — used by the watchdog
  let watchdogTimer = null;
  const WATCHDOG_INTERVAL_MS = 1200;
  const STUCK_THRESHOLD_MS = 2500; // if no result for this long while running, force-restart

  function isDuplicateFinal(text){
    const now = Date.now();
    const withinWindow = (now - lastFinalTime) < 4000;
    if(!withinWindow) return false;
    if(text === lastFinalChunk) return true;
    if(text.length > 0 && lastFinalChunk.length > 0){
      if(lastFinalChunk.includes(text) || text.includes(lastFinalChunk)) return true;
    }
    return false;
  }

  function setStatus(state){
    if(state === 'live'){
      statusDot.classList.add('live');
      statusText.textContent = '듣는 중';
      micBtn.textContent = '받아쓰기 중지';
      micBtn.classList.add('active');
    } else {
      statusDot.classList.remove('live');
      statusText.textContent = '대기 중';
      micBtn.textContent = '받아쓰기 시작';
      micBtn.classList.remove('active');
    }
  }

  function showError(msg){
    errorBox.style.display = 'block';
    errorBox.textContent = msg;
  }
  function hideError(){
    errorBox.style.display = 'none';
  }

  function renderTranscript(){
    if(finalizedText || pendingInterim){
      feedEmpty.style.display = 'none';
      transcriptEl.style.display = 'block';
    }
    let html = '';
    if(finalizedText){
      html += `<span class="final-chunk">${escapeHtml(finalizedText)}</span>`;
    }
    if(pendingInterim){
      html += (finalizedText ? ' ' : '') + `<span class="interim-chunk">${escapeHtml(pendingInterim)}</span>`;
    }
    transcriptEl.innerHTML = html;
    feed.scrollTop = feed.scrollHeight;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function commitFinal(text){
    const clean = text.trim();
    if(!clean) return;
    if(isDuplicateFinal(clean)){
      pendingInterim = '';
      renderTranscript();
      return;
    }
    lastFinalChunk = clean;
    lastFinalTime = Date.now();
    finalizedText = finalizedText ? (finalizedText + ' ' + clean) : clean;
    pendingInterim = '';
    renderTranscript();
  }

  function buildRecognition(){
    // We listen in Korean mode by default — Web Speech API's ko-KR recognizer
    // is generally tolerant of mixed Korean/English speech (it will transcribe
    // English words reasonably well within a ko-KR session), so we don't need
    // to constantly switch recognizer language back and forth.
    const rec = new SpeechRecognition();
    rec.lang = 'ko-KR';
    rec.continuous = true;
    rec.interimResults = true;
    rec.maxAlternatives = 1;

    rec.onresult = (event) => {
      lastResultTime = Date.now();
      let interimText = '';
      let finalText = '';

      for(let i = event.resultIndex; i < event.results.length; i++){
        const transcript = event.results[i][0].transcript;
        if(event.results[i].isFinal){
          finalText += transcript;
        } else {
          interimText += transcript;
        }
      }

      if(finalText.trim()){
        commitFinal(finalText);
      } else if(interimText.trim()){
        pendingInterim = interimText.trim();
        renderTranscript();
      }
    };

    rec.onerror = (event) => {
      if(event.error === 'no-speech'){
        // normal during pauses — do nothing, onend will restart it
        return;
      }
      if(event.error === 'not-allowed' || event.error === 'service-not-allowed'){
        showError('마이크 권한이 필요합니다. 브라우저 설정에서 마이크 접근을 허용해주세요.');
        running = false;
        stopWatchdog();
        setStatus('idle');
        return;
      }
      if(event.error === 'network'){
        showError('네트워크 오류가 발생했습니다. 인터넷 연결을 확인하세요.');
        return;
      }
      // other transient errors: ignore, rely on onend to restart
    };

    rec.onend = () => {
      // Fires on natural pause timeouts AND manual stop.
      // If there's leftover interim text that never got finalized, commit it
      // now so the tail of the sentence isn't lost.
      if(pendingInterim){
        commitFinal(pendingInterim);
      }
      // Restart immediately if the user still wants to be listening — this is
      // what prevents the gap between sessions from swallowing words.
      if(running && !restarting){
        restarting = true;
        try{ recognition.start(); }
        catch(e){ /* already started, ignore */ }
        restarting = false;
      }
    };

    return rec;
  }

  function startWatchdog(){
    stopWatchdog();
    lastResultTime = Date.now();
    watchdogTimer = setInterval(() => {
      if(!running) return;
      const idleFor = Date.now() - lastResultTime;
      if(idleFor > STUCK_THRESHOLD_MS){
        // Session reports as "live" but isn't actually delivering results —
        // force a hard restart.
        lastResultTime = Date.now();
        try{ recognition.stop(); }
        catch(e){
          try{
            recognition = buildRecognition();
            recognition.start();
          } catch(e2){ /* watchdog will retry next tick */ }
        }
      }
    }, WATCHDOG_INTERVAL_MS);
  }

  function stopWatchdog(){
    if(watchdogTimer){
      clearInterval(watchdogTimer);
      watchdogTimer = null;
    }
  }

  function startListening(){
    hideError();
    recognition = buildRecognition();
    try{
      recognition.start();
      running = true;
      setStatus('live');
      startWatchdog();
      requestWakeLock();
    } catch(e){
      showError('음성 인식을 시작할 수 없습니다. 다시 시도해주세요.');
    }
  }

  function stopListening(){
    running = false;
    stopWatchdog();
    if(recognition){
      try{ recognition.stop(); } catch(e){}
    }
    setStatus('idle');
    releaseWakeLock();
  }

  micBtn.addEventListener('click', () => {
    if(running){
      stopListening();
    } else {
      startListening();
    }
  });

  clearBtn.addEventListener('click', () => {
    finalizedText = '';
    pendingInterim = '';
    lastFinalChunk = '';
    transcriptEl.innerHTML = '';
    transcriptEl.style.display = 'none';
    feedEmpty.style.display = 'block';
  });

  // Keep screen awake while listening, if supported
  let wakeLock = null;
  async function requestWakeLock(){
    try{
      if('wakeLock' in navigator){
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch(e){ /* not critical, ignore */ }
  }
  function releaseWakeLock(){
    if(wakeLock){
      try{ wakeLock.release(); } catch(e){}
      wakeLock = null;
    }
  }

})();
</script>
</body>
</html>
